# shellcheck shell=bash
# shellcheck disable=SC2034
# This file is the canonical source for project-level identity and defaults.
# Legacy entrypoints load it when available and retain standalone fallbacks.

# Project identity
PROJECT_NAME="ming.sh"
PROJECT_ID="ming-sh"
PROJECT_COMMAND="m"
PROJECT_SCRIPT_NAME="ming.sh"
PROJECT_VERSION="0.1.0"
UPSTREAM_VERSION="4.5.2"

# Repository
PROJECT_REPO="JohnMing143/ming-sh"
PROJECT_BRANCH="main"
PROJECT_REPO_URL="https://github.com/${PROJECT_REPO}"
PROJECT_RAW_BASE="https://raw.githubusercontent.com/${PROJECT_REPO}/${PROJECT_BRANCH}"
PROJECT_LICENSE_URL="${PROJECT_REPO_URL}/blob/${PROJECT_BRANCH}/LICENSE"
PROJECT_ISSUES_URL="${PROJECT_REPO_URL}/issues"

# Installation
PROJECT_HOME_PATH="${HOME}/${PROJECT_SCRIPT_NAME}"
PROJECT_INSTALL_PATH="/usr/local/bin/${PROJECT_COMMAND}"
PROJECT_BACKUP_PATH="${PROJECT_HOME_PATH}.bak"
PROJECT_LINK_PATH=""

# Updates remain disabled until a trusted update design is implemented.
ENABLE_SELF_UPDATE="false"
ENABLE_AUTO_UPDATE="false"
PROJECT_UPDATE_URL=""
PROJECT_UPDATE_LOG_URL=""

# Project links
PROJECT_WEBSITE_URL=""
PROJECT_SUPPORT_URL=""
PROJECT_APPS_REPO=""
GITHUB_PROXY_BASE=""

# Existing functional roots. Centralizing these values does not authorize
# changing the paths or writing to them during development.
PROJECT_APP_ROOT="/home/docker"
PROJECT_WEB_ROOT="/home/web"
PROJECT_CONFIG_DIR="${XDG_CONFIG_HOME:-${HOME}/.config}/${PROJECT_ID}"
PROJECT_STATE_DIR="${XDG_STATE_HOME:-${HOME}/.local/state}/${PROJECT_ID}"
PROJECT_CACHE_DIR="${XDG_CACHE_HOME:-${HOME}/.cache}/${PROJECT_ID}"
PROJECT_CRON_TAG="${PROJECT_ID}"

# Upstream attribution and compatibility
UPSTREAM_REPO="kejilion/sh"
UPSTREAM_REPO_URL="https://github.com/${UPSTREAM_REPO}"
UPSTREAM_RAW_BASE="https://raw.githubusercontent.com/${UPSTREAM_REPO}/main"
UPSTREAM_CONFIG_RAW_BASE="https://raw.githubusercontent.com/kejilion/config/main"
UPSTREAM_NGINX_RAW_BASE="https://raw.githubusercontent.com/kejilion/nginx/main"
UPSTREAM_DOCKER_RAW_BASE="https://raw.githubusercontent.com/kejilion/docker/main"
UPSTREAM_APPS_REPO_URL="https://github.com/kejilion/apps.git"
UPSTREAM_WEBSITE_SOURCE_RAW_BASE="https://raw.githubusercontent.com/kejilion/Website_source_code/main"
UPSTREAM_IMAGE_NAMESPACE="kjlion"
UPSTREAM_NGINX_IMAGE="${UPSTREAM_IMAGE_NAMESPACE}/nginx:alpine"
UPSTREAM_FRP_IMAGE="${UPSTREAM_IMAGE_NAMESPACE}/frp:alpine"
UPSTREAM_WIREGUARD_IMAGE="${UPSTREAM_IMAGE_NAMESPACE}/wireguard:alpine"
UPSTREAM_DB_USER_PLACEHOLDER="kejilion"
UPSTREAM_DB_PASSWORD_PLACEHOLDER="kejilionYYDS"
UPSTREAM_CLOUDFLARE_EMAIL_PLACEHOLDER="kejilion@outlook.com"
UPSTREAM_PALWORLD_SETTINGS_URL="https://kejilion.pro/PalWorldSettings.ini"
UPSTREAM_LICENSE="Apache-2.0"
KEEP_LEGACY_K="true"
KEEP_LEGACY_PATHS="true"
LEGACY_COMMAND="k"
LEGACY_SCRIPT_NAME="kejilion.sh"
LEGACY_HOME_PATH="${HOME}/${LEGACY_SCRIPT_NAME}"
LEGACY_BACKUP_PATH="${LEGACY_HOME_PATH}.bak"
LEGACY_INSTALL_PATH="/usr/local/bin/${LEGACY_COMMAND}"
LEGACY_LINK_PATH="/usr/bin/${LEGACY_COMMAND}"

# Compatibility-sensitive system paths. Existing installations keep using the
# upstream paths while KEEP_LEGACY_PATHS=true; new names are ready for a later
# opt-in migration.
PROJECT_BBR_CONFIG_PATH="/etc/sysctl.d/99-${PROJECT_ID}-bbr.conf"
PROJECT_OPTIMIZE_CONFIG_PATH="/etc/sysctl.d/99-${PROJECT_ID}-optimize.conf"
PROJECT_OPTIMIZE_MARKER="# ${PROJECT_ID}-optimize"
LEGACY_BBR_CONFIG_PATH="/etc/sysctl.d/99-kejilion-bbr.conf"
LEGACY_OPTIMIZE_CONFIG_PATH="/etc/sysctl.d/99-kejilion-optimize.conf"
LEGACY_OPTIMIZE_MARKER="# kejilion-optimize"

if [ "$KEEP_LEGACY_PATHS" = "true" ]; then
	ACTIVE_BBR_CONFIG_PATH="$LEGACY_BBR_CONFIG_PATH"
	ACTIVE_OPTIMIZE_CONFIG_PATH="$LEGACY_OPTIMIZE_CONFIG_PATH"
	ACTIVE_OPTIMIZE_MARKER="$LEGACY_OPTIMIZE_MARKER"
else
	ACTIVE_BBR_CONFIG_PATH="$PROJECT_BBR_CONFIG_PATH"
	ACTIVE_OPTIMIZE_CONFIG_PATH="$PROJECT_OPTIMIZE_CONFIG_PATH"
	ACTIVE_OPTIMIZE_MARKER="$PROJECT_OPTIMIZE_MARKER"
fi

# A proxy, when explicitly configured, prefixes the GitHub host without the
# scheme (matching common GitHub proxy URL layouts). Defaults are direct.
if [ -n "$GITHUB_PROXY_BASE" ]; then
	PROJECT_DOWNLOAD_BASE="${GITHUB_PROXY_BASE%/}/${PROJECT_RAW_BASE#https://}"
	UPSTREAM_CONFIG_DOWNLOAD_BASE="${GITHUB_PROXY_BASE%/}/${UPSTREAM_CONFIG_RAW_BASE#https://}"
	UPSTREAM_NGINX_DOWNLOAD_BASE="${GITHUB_PROXY_BASE%/}/${UPSTREAM_NGINX_RAW_BASE#https://}"
	UPSTREAM_DOCKER_DOWNLOAD_BASE="${GITHUB_PROXY_BASE%/}/${UPSTREAM_DOCKER_RAW_BASE#https://}"
	UPSTREAM_APPS_DOWNLOAD_URL="${GITHUB_PROXY_BASE%/}/${UPSTREAM_APPS_REPO_URL#https://}"
	UPSTREAM_WEBSITE_SOURCE_DOWNLOAD_BASE="${GITHUB_PROXY_BASE%/}/${UPSTREAM_WEBSITE_SOURCE_RAW_BASE#https://}"
else
	PROJECT_DOWNLOAD_BASE="$PROJECT_RAW_BASE"
	UPSTREAM_CONFIG_DOWNLOAD_BASE="$UPSTREAM_CONFIG_RAW_BASE"
	UPSTREAM_NGINX_DOWNLOAD_BASE="$UPSTREAM_NGINX_RAW_BASE"
	UPSTREAM_DOCKER_DOWNLOAD_BASE="$UPSTREAM_DOCKER_RAW_BASE"
	UPSTREAM_APPS_DOWNLOAD_URL="$UPSTREAM_APPS_REPO_URL"
	UPSTREAM_WEBSITE_SOURCE_DOWNLOAD_BASE="$UPSTREAM_WEBSITE_SOURCE_RAW_BASE"
fi

if [ -n "$PROJECT_APPS_REPO" ]; then
	case "$PROJECT_APPS_REPO" in
		http://*|https://*) ACTIVE_APPS_REPO_URL="$PROJECT_APPS_REPO" ;;
		*) ACTIVE_APPS_REPO_URL="https://github.com/${PROJECT_APPS_REPO%.git}.git" ;;
	esac
	if [ -n "$GITHUB_PROXY_BASE" ]; then
		ACTIVE_APPS_REPO_URL="${GITHUB_PROXY_BASE%/}/${ACTIVE_APPS_REPO_URL#https://}"
	fi
else
	ACTIVE_APPS_REPO_URL="$UPSTREAM_APPS_DOWNLOAD_URL"
fi

# Locale policy is recorded here; removal is a separate change.
IR_RU_POLICY="remove"
