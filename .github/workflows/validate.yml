name: validate

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# Safe validation only: syntax checks, static safety regressions, and stubbed
# smoke tests. The Docker matrix and anything touching real services, package
# managers, or privileged paths stay excluded, matching SECURITY_AUDIT.md.
jobs:
  safe-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Bash syntax checks
        run: |
          git ls-files '*.sh' | while IFS= read -r shell_file; do
            echo "== $shell_file"
            bash -n "$shell_file"
          done

      - name: Python syntax checks
        run: python3 -m py_compile translate.py lib/inline.py tests/normalize_shell_skeleton.py

      - name: ShellCheck (helpers, tests, library)
        run: |
          if ! command -v shellcheck >/dev/null 2>&1; then
            sudo apt-get update && sudo apt-get install -y shellcheck
          fi
          # The monolithic entrypoints are excluded: ShellCheck's memory use on
          # a 21k-line generated file can exhaust the runner (see SECURITY_AUDIT.md).
          # Error severity is the initial gate; tightening it is future work.
          mapfile -t shell_files < <(git ls-files '*.sh' \
            | grep -vE '^(ming\.sh|(cn|en|jp|kr|tw)/ming\.sh)$')
          printf '== %s\n' "${shell_files[@]}"
          shellcheck --severity=error "${shell_files[@]}"

      - name: Safety regression tests
        run: |
          for test_file in tests/tests_*.sh; do
            echo "== $test_file"
            bash "$test_file"
          done

      - name: OpenClaw smoke tests
        run: |
          bash tests_openclaw_manager_smoke.sh
          for test_file in tests/openclaw/tests_*.sh cn/tests/openclaw/tests_*.sh; do
            echo "== $test_file"
            bash "$test_file"
          done
